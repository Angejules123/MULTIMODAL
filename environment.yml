name: alzheimer-vit
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # Python
  - python=3.10
  
  # PyTorch et deep learning
  - pytorch=2.1.0
  - torchvision=0.16.0
  - torchaudio=2.1.0
  - pytorch-cuda=11.8
  - cudatoolkit=11.8
  
  # Transformers et Hugging Face
  - pip
  - pip:
    - transformers==4.35.0
    - accelerate==0.24.0
    - datasets==2.14.0
  
  # Vision et traitement d'images
  - opencv=4.8.0
  - pillow=10.0.0
  - albumentations=1.3.1
  
  # Data science et ML
  - numpy=1.24.3
  - pandas=2.0.3
  - scikit-learn=1.3.0
  - scipy=1.11.0
  
  # Visualisation
  - matplotlib=3.7.2
  - seaborn=0.12.2
  - plotly=5.17.0
  
  # Métriques et évaluation
  - scikit-image=0.21.0
  
  # Utilitaires
  - tqdm=4.66.0
  - jupyter=1.0.0
  - ipykernel=6.25.0
  - notebook=7.0.0
  
  # Gestion de projet
  - pyyaml=6.0
  
  # Optionnel mais recommandé
  - tensorboard=2.14.0
  - pip:
    - wandb==0.15.12  # Pour tracking expérimental
    - grad-cam==1.4.8  # Pour explicabilité
    - captum==0.6.0    # Pour interprétabilité PyTorch